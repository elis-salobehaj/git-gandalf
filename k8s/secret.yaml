# Sensitive configuration — replace placeholder values before applying.
# In production, manage this with Sealed Secrets, External Secrets Operator,
# or your cloud provider's secret store (AWS Secrets Manager, GCP Secret Manager).
#
# Values under stringData are plain text. Kubernetes encodes them automatically.
apiVersion: v1
kind: Secret
metadata:
  name: git-gandalf-secrets
  namespace: git-gandalf
type: Opaque
stringData:
  # Required
  GITLAB_TOKEN: "glpat-REPLACE_ME"
  GITLAB_WEBHOOK_SECRET: "REPLACE_ME"
  AWS_BEARER_TOKEN_BEDROCK: "REPLACE_ME"
  VALKEY_URL: "redis://valkey:6379"
  # Optional — only required when 'openai' is in LLM_PROVIDER_ORDER
  # OPENAI_API_KEY: "sk-REPLACE_ME"
  # Optional — only required when 'google' is in LLM_PROVIDER_ORDER
  # GOOGLE_AI_API_KEY: "REPLACE_ME"
  # Optional — Jira enrichment (JIRA_ENABLED=true required in ConfigMap)
  # JIRA_BASE_URL: "https://your-domain.atlassian.net"
  # JIRA_EMAIL: "bot@example.com"
  # JIRA_API_TOKEN: "REPLACE_ME"
